<svg width="820" height="580" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 580">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; }
      .cat-title { font-size: 13px; font-weight: bold; }
      .inst-label { font-size: 10px; fill: #374151; }
      .inst-sub { font-size: 8.5px; fill: #6b7280; font-style: italic; }
    </style>
  </defs>
  <rect width="820" height="580" fill="#f8fafc" rx="4"/>
  <text x="410" y="26" text-anchor="middle" font-size="17" font-weight="bold" fill="#0f172a">Common Surgical Instruments</text>
  <text x="410" y="42" text-anchor="middle" font-size="10" fill="#64748b">Schematic silhouettes — not to scale</text>

  <!-- ============ CATEGORY 1: CUTTING / INCISING ============ -->
  <rect x="10" y="52" width="390" height="155" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="205" y="70" text-anchor="middle" class="cat-title" fill="#dc2626">CUTTING &amp; INCISING</text>

  <!-- Scalpel #10 blade -->
  <g transform="translate(25, 80)">
    <!-- Handle -->
    <rect x="0" y="8" width="50" height="12" rx="2" fill="#6b7280"/>
    <!-- Blade -->
    <path d="M 50,8 L 80,10 L 78,14 L 50,20 Z" fill="#94a3b8"/>
    <path d="M 78,10 L 90,14 L 78,14 Z" fill="#e5e7eb"/>
    <text x="45" y="38" text-anchor="middle" class="inst-label">#10 Blade / #4 Handle</text>
    <text x="45" y="49" text-anchor="middle" class="inst-sub">Large skin incisions</text>
  </g>

  <!-- Scalpel #15 blade -->
  <g transform="translate(140, 80)">
    <rect x="0" y="8" width="45" height="12" rx="2" fill="#6b7280"/>
    <path d="M 45,9 L 72,12 L 70,14 L 45,19 Z" fill="#94a3b8"/>
    <path d="M 70,12 L 76,16 L 70,16 Z" fill="#e5e7eb"/>
    <text x="40" y="38" text-anchor="middle" class="inst-label">#15 Blade / #3 Handle</text>
    <text x="40" y="49" text-anchor="middle" class="inst-sub">Fine incisions, ENT, plastics</text>
  </g>

  <!-- Mayo scissors (straight) -->
  <g transform="translate(260, 78)">
    <!-- Ring handles -->
    <circle cx="10" cy="8" r="7" fill="none" stroke="#4b5563" stroke-width="2"/>
    <circle cx="22" cy="8" r="7" fill="none" stroke="#4b5563" stroke-width="2"/>
    <!-- Shank -->
    <line x1="14" y1="8" x2="30" y2="22" stroke="#4b5563" stroke-width="3"/>
    <line x1="18" y1="8" x2="34" y2="22" stroke="#4b5563" stroke-width="3"/>
    <!-- Blades -->
    <path d="M 30,22 L 80,28 L 79,32 L 30,26 Z" fill="#6b7280"/>
    <path d="M 34,22 L 80,32 L 79,36 L 34,26 Z" fill="#6b7280"/>
    <text x="45" y="50" text-anchor="middle" class="inst-label">Mayo Scissors (Str.)</text>
    <text x="45" y="61" text-anchor="middle" class="inst-sub">Heavy tissue division</text>
  </g>

  <!-- Metzenbaum scissors -->
  <g transform="translate(25, 150)">
    <circle cx="10" cy="8" r="7" fill="none" stroke="#4b5563" stroke-width="2"/>
    <circle cx="22" cy="8" r="7" fill="none" stroke="#4b5563" stroke-width="2"/>
    <line x1="14" y1="8" x2="28" y2="20" stroke="#4b5563" stroke-width="2.5"/>
    <line x1="18" y1="8" x2="32" y2="20" stroke="#4b5563" stroke-width="2.5"/>
    <!-- Longer finer blades -->
    <path d="M 28,20 L 90,24 L 89,27 L 28,23 Z" fill="#9ca3af"/>
    <path d="M 32,20 L 90,27 L 89,30 L 32,23 Z" fill="#9ca3af"/>
    <text x="50" y="45" text-anchor="middle" class="inst-label">Metzenbaum Scissors</text>
    <text x="50" y="56" text-anchor="middle" class="inst-sub">Delicate dissection</text>
  </g>

  <!-- Electrosurgical pencil (Bovie) -->
  <g transform="translate(165, 148)">
    <!-- Pencil body -->
    <rect x="0" y="8" width="90" height="14" rx="5" fill="#374151"/>
    <!-- Tip -->
    <path d="M 90,8 L 105,15 L 90,22 Z" fill="#6b7280"/>
    <!-- Button -->
    <rect x="20" y="10" width="18" height="8" rx="2" fill="#dc2626"/>
    <rect x="45" y="10" width="18" height="8" rx="2" fill="#f59e0b"/>
    <!-- Cord -->
    <path d="M 0,15 Q -15,20 -20,30" stroke="#64748b" stroke-width="2" fill="none"/>
    <text x="50" y="38" text-anchor="middle" class="inst-label">Electrosurgical Pencil (Bovie)</text>
    <text x="50" y="49" text-anchor="middle" class="inst-sub">Monopolar ESU; cut + coagulate</text>
  </g>

  <!-- ============ CATEGORY 2: GRASPING / CLAMPING ============ -->
  <rect x="10" y="217" width="390" height="165" rx="6" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="205" y="235" text-anchor="middle" class="cat-title" fill="#1d4ed8">GRASPING &amp; CLAMPING</text>

  <!-- Kelly clamp -->
  <g transform="translate(25, 245)">
    <circle cx="10" cy="8" r="7" fill="none" stroke="#4b5563" stroke-width="2"/>
    <circle cx="22" cy="8" r="7" fill="none" stroke="#4b5563" stroke-width="2"/>
    <!-- Box lock -->
    <rect x="14" y="14" width="10" height="8" rx="1" fill="#9ca3af"/>
    <!-- Jaws with ratchet -->
    <path d="M 24,18 L 80,22 L 80,26 L 24,22 Z" fill="#6b7280"/>
    <path d="M 24,22 L 80,26 L 80,30 L 24,26 Z" fill="#6b7280"/>
    <!-- Horizontal serrations -->
    <line x1="40" y1="23" x2="40" y2="29" stroke="#e5e7eb" stroke-width="0.8"/>
    <line x1="50" y1="23" x2="50" y2="29" stroke="#e5e7eb" stroke-width="0.8"/>
    <line x1="60" y1="23" x2="60" y2="29" stroke="#e5e7eb" stroke-width="0.8"/>
    <line x1="70" y1="23" x2="70" y2="29" stroke="#e5e7eb" stroke-width="0.8"/>
    <!-- Ratchet indicator -->
    <path d="M 18,22 L 14,28 L 22,28 Z" fill="#374151" opacity="0.6"/>
    <text x="45" y="48" text-anchor="middle" class="inst-label">Kelly Clamp (Hemostat)</text>
    <text x="45" y="59" text-anchor="middle" class="inst-sub">Clamping vessels; half-serrated jaw</text>
  </g>

  <!-- Babcock clamp -->
  <g transform="translate(165, 245)">
    <circle cx="10" cy="8" r="7" fill="none" stroke="#4b5563" stroke-width="2"/>
    <circle cx="22" cy="8" r="7" fill="none" stroke="#4b5563" stroke-width="2"/>
    <rect x="14" y="14" width="10" height="8" rx="1" fill="#9ca3af"/>
    <!-- Fenestrated jaw (Babcock characteristic) -->
    <path d="M 24,15 Q 60,12 82,18 Q 82,24 60,28 Q 40,30 24,28 Z" fill="#6b7280"/>
    <ellipse cx="55" cy="22" rx="16" ry="6" fill="#eff6ff"/>
    <text x="50" y="48" text-anchor="middle" class="inst-label">Babcock Clamp</text>
    <text x="50" y="59" text-anchor="middle" class="inst-sub">Atraumatic; bowel &amp; appendix</text>
  </g>

  <!-- Allis clamp -->
  <g transform="translate(305, 245)">
    <circle cx="10" cy="8" r="7" fill="none" stroke="#4b5563" stroke-width="2"/>
    <circle cx="22" cy="8" r="7" fill="none" stroke="#4b5563" stroke-width="2"/>
    <rect x="14" y="14" width="10" height="8" rx="1" fill="#9ca3af"/>
    <!-- Allis teeth jaw -->
    <path d="M 24,15 L 78,18 L 78,22 L 24,22 Z" fill="#6b7280"/>
    <path d="M 24,22 L 78,22 L 78,26 L 24,26 Z" fill="#6b7280"/>
    <!-- Teeth at tip -->
    <line x1="72" y1="18" x2="72" y2="26" stroke="#374151" stroke-width="1.5"/>
    <line x1="76" y1="18" x2="76" y2="26" stroke="#374151" stroke-width="1.5"/>
    <line x1="68" y1="18" x2="68" y2="26" stroke="#374151" stroke-width="1.5"/>
    <text x="50" y="44" text-anchor="middle" class="inst-label">Allis Clamp</text>
    <text x="50" y="55" text-anchor="middle" class="inst-sub">Toothed jaw; grips tissue firmly</text>
  </g>

  <!-- DeBakey forceps -->
  <g transform="translate(25, 330)">
    <!-- Two long tines -->
    <rect x="15" y="0" width="4" height="70" rx="2" fill="#6b7280"/>
    <rect x="21" y="0" width="4" height="70" rx="2" fill="#6b7280"/>
    <!-- Thumb platform -->
    <rect x="10" y="0" width="20" height="8" rx="3" fill="#374151"/>
    <text x="25" y="84" text-anchor="middle" class="inst-label">DeBakey Forceps</text>
    <text x="25" y="95" text-anchor="middle" class="inst-sub">Atraumatic; vessels</text>
  </g>

  <!-- Needle driver -->
  <g transform="translate(100, 320)">
    <circle cx="10" cy="8" r="7" fill="none" stroke="#4b5563" stroke-width="2"/>
    <circle cx="22" cy="8" r="7" fill="none" stroke="#4b5563" stroke-width="2"/>
    <rect x="14" y="14" width="10" height="8" rx="1" fill="#9ca3af"/>
    <!-- Heavy jaws (shorter + heavier than scissor) -->
    <path d="M 24,16 L 68,18 L 68,22 L 24,22 Z" fill="#374151"/>
    <path d="M 24,22 L 68,22 L 68,26 L 24,26 Z" fill="#374151"/>
    <!-- Cross-serrated pattern -->
    <line x1="35" y1="18" x2="35" y2="26" stroke="#9ca3af" stroke-width="0.8"/>
    <line x1="44" y1="18" x2="44" y2="26" stroke="#9ca3af" stroke-width="0.8"/>
    <line x1="53" y1="18" x2="53" y2="26" stroke="#9ca3af" stroke-width="0.8"/>
    <line x1="62" y1="18" x2="62" y2="26" stroke="#9ca3af" stroke-width="0.8"/>
    <!-- A loaded needle -->
    <path d="M 55,14 Q 72,10 80,18 Q 72,26 55,26" stroke="#dc2626" stroke-width="1.5" fill="none"/>
    <line x1="80" y1="18" x2="95" y2="16" stroke="#dc2626" stroke-width="1"/>
    <text x="48" y="46" text-anchor="middle" class="inst-label">Needle Driver (Mayo-Hegar)</text>
    <text x="48" y="57" text-anchor="middle" class="inst-sub">Holds suture needle; with loaded needle shown</text>
  </g>

  <!-- ============ CATEGORY 3: RETRACTORS ============ -->
  <rect x="410" y="52" width="400" height="175" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="610" y="70" text-anchor="middle" class="cat-title" fill="#15803d">RETRACTORS</text>

  <!-- Army-Navy -->
  <g transform="translate(425, 80)">
    <!-- Double-ended: S-shape -->
    <path d="M 0,15 L 30,15 Q 40,15 40,5 L 40,0" stroke="#374151" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M 0,15 L 30,15 Q 40,15 40,25 L 40,30" stroke="#374151" stroke-width="5" fill="none" stroke-linecap="round"/>
    <rect x="-5" y="12" width="35" height="6" rx="1" fill="#6b7280"/>
    <text x="20" y="48" text-anchor="middle" class="inst-label">Army-Navy Retractor</text>
    <text x="20" y="59" text-anchor="middle" class="inst-sub">Superficial; hand-held</text>
  </g>

  <!-- Deaver -->
  <g transform="translate(530, 78)">
    <!-- Long blade with curved tip -->
    <rect x="10" y="0" width="14" height="55" rx="3" fill="#6b7280"/>
    <!-- Curved paddle at bottom -->
    <path d="M 6,55 Q 17,70 28,55" stroke="#6b7280" stroke-width="8" fill="none" stroke-linecap="round"/>
    <!-- Handle/crosspiece at top -->
    <rect x="0" y="0" width="34" height="8" rx="3" fill="#374151"/>
    <text x="17" y="88" text-anchor="middle" class="inst-label">Deaver Retractor</text>
    <text x="17" y="99" text-anchor="middle" class="inst-sub">Deep abdominal</text>
  </g>

  <!-- Weitlaner (self-retaining) -->
  <g transform="translate(618, 76)">
    <circle cx="10" cy="8" r="7" fill="none" stroke="#4b5563" stroke-width="2"/>
    <circle cx="30" cy="8" r="7" fill="none" stroke="#4b5563" stroke-width="2"/>
    <rect x="16" y="14" width="8" height="8" rx="1" fill="#9ca3af"/>
    <!-- Raking prongs on each arm -->
    <!-- Left arm with prongs -->
    <path d="M 10,14 L 0,50" stroke="#374151" stroke-width="3"/>
    <line x1="-8" y1="44" x2="0" y2="50" stroke="#374151" stroke-width="2"/>
    <line x1="-4" y1="38" x2="0" y2="50" stroke="#374151" stroke-width="2"/>
    <!-- Right arm with prongs -->
    <path d="M 30,14 L 40,50" stroke="#374151" stroke-width="3"/>
    <line x1="48" y1="44" x2="40" y2="50" stroke="#374151" stroke-width="2"/>
    <line x1="44" y1="38" x2="40" y2="50" stroke="#374151" stroke-width="2"/>
    <text x="20" y="68" text-anchor="middle" class="inst-label">Weitlaner (Self-Ret.)</text>
    <text x="20" y="79" text-anchor="middle" class="inst-sub">Raking prongs; holds open</text>
  </g>

  <!-- Finochietto -->
  <g transform="translate(730, 78)">
    <!-- Central bar -->
    <rect x="10" y="20" width="50" height="8" rx="2" fill="#374151"/>
    <!-- Two curved blades spreading -->
    <path d="M 10,24 Q 0,24 0,38 L 0,60" stroke="#374151" stroke-width="8" fill="none" stroke-linecap="round"/>
    <path d="M 60,24 Q 70,24 70,38 L 70,60" stroke="#374151" stroke-width="8" fill="none" stroke-linecap="round"/>
    <!-- Ratchet screw in center -->
    <circle cx="35" cy="24" r="6" fill="#6b7280" stroke="#374151" stroke-width="1"/>
    <line x1="35" y1="18" x2="35" y2="30" stroke="#374151" stroke-width="2"/>
    <text x="35" y="80" text-anchor="middle" class="inst-label">Finochietto</text>
    <text x="35" y="91" text-anchor="middle" class="inst-sub">Sternal/rib spreader</text>
  </g>

  <!-- ============ CATEGORY 4: SUCTION ============ -->
  <rect x="410" y="237" width="400" height="145" rx="6" fill="#faf5ff" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="610" y="255" text-anchor="middle" class="cat-title" fill="#7c3aed">SUCTION DEVICES</text>

  <!-- Yankauer -->
  <g transform="translate(425, 265)">
    <!-- Handle -->
    <rect x="0" y="10" width="45" height="12" rx="4" fill="#374151"/>
    <!-- Curved tube -->
    <path d="M 45,16 Q 65,16 70,8 L 100,4" stroke="#6b7280" stroke-width="7" fill="none" stroke-linecap="round"/>
    <!-- Bulbous tip -->
    <circle cx="100" cy="4" r="6" fill="#9ca3af"/>
    <!-- Thumb hole -->
    <circle cx="12" cy="16" r="4" fill="#6b7280"/>
    <text x="50" y="38" text-anchor="middle" class="inst-label">Yankauer Suction</text>
    <text x="50" y="49" text-anchor="middle" class="inst-sub">Oropharynx; general use</text>
  </g>

  <!-- Poole suction -->
  <g transform="translate(570, 265)">
    <!-- Outer sheath (fenestrated) -->
    <rect x="0" y="8" width="100" height="14" rx="4" fill="#9ca3af"/>
    <!-- Holes in sheath -->
    <circle cx="20" cy="15" r="3" fill="#f8fafc"/>
    <circle cx="35" cy="15" r="3" fill="#f8fafc"/>
    <circle cx="50" cy="15" r="3" fill="#f8fafc"/>
    <circle cx="65" cy="15" r="3" fill="#f8fafc"/>
    <circle cx="80" cy="15" r="3" fill="#f8fafc"/>
    <!-- Inner cannula -->
    <rect x="2" y="11" width="100" height="8" rx="2" fill="#6b7280"/>
    <!-- Handle end -->
    <rect x="96" y="5" width="20" height="20" rx="3" fill="#374151"/>
    <text x="55" y="40" text-anchor="middle" class="inst-label">Poole Suction (Abdominal)</text>
    <text x="55" y="51" text-anchor="middle" class="inst-sub">Fenestrated; large volume fluid removal</text>
  </g>

  <!-- Frazier suction -->
  <g transform="translate(425, 340)">
    <!-- Very thin tube -->
    <path d="M 0,15 L 90,10" stroke="#6b7280" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- Handle -->
    <rect x="80" y="8" width="24" height="8" rx="3" fill="#374151"/>
    <!-- Vent hole -->
    <circle cx="88" cy="12" r="3" fill="#9ca3af"/>
    <text x="52" y="32" text-anchor="middle" class="inst-label">Frazier (Ferguson) Suction</text>
    <text x="52" y="43" text-anchor="middle" class="inst-sub">Fine; neuro, ENT, ear surgery</text>
  </g>

  <!-- ============ CATEGORY 5: SPECIALIZED ============ -->
  <rect x="10" y="392" width="800" height="178" rx="6" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
  <text x="410" y="410" text-anchor="middle" class="cat-title" fill="#c2410c">SPECIALTY INSTRUMENTS</text>

  <!-- Kerrison rongeur -->
  <g transform="translate(25, 420)">
    <circle cx="10" cy="8" r="7" fill="none" stroke="#4b5563" stroke-width="2"/>
    <circle cx="22" cy="8" r="7" fill="none" stroke="#4b5563" stroke-width="2"/>
    <rect x="14" y="14" width="10" height="8" rx="1" fill="#9ca3af"/>
    <!-- Long shaft -->
    <rect x="24" y="18" width="70" height="6" rx="1" fill="#6b7280"/>
    <!-- Footplate at tip -->
    <rect x="92" y="14" width="10" height="14" rx="2" fill="#374151"/>
    <!-- Punching jaw -->
    <path d="M 94,14 L 94,20 L 88,20 L 94,14" fill="#6b7280"/>
    <text x="52" y="50" text-anchor="middle" class="inst-label">Kerrison Rongeur</text>
    <text x="52" y="61" text-anchor="middle" class="inst-sub">Bite bone; laminectomy</text>
  </g>

  <!-- Hohmann retractor -->
  <g transform="translate(175, 420)">
    <!-- Blade -->
    <rect x="10" y="0" width="8" height="60" rx="2" fill="#6b7280"/>
    <!-- Sharp point at bottom -->
    <polygon points="10,60 18,60 14,72" fill="#374151"/>
    <!-- Handle at top angled -->
    <rect x="0" y="0" width="28" height="8" rx="3" fill="#374151"/>
    <text x="14" y="88" text-anchor="middle" class="inst-label">Hohmann</text>
    <text x="14" y="99" text-anchor="middle" class="inst-sub">Bone retractor; THA/TKA</text>
  </g>

  <!-- Pituitary rongeur -->
  <g transform="translate(280, 418)">
    <circle cx="10" cy="8" r="7" fill="none" stroke="#4b5563" stroke-width="2"/>
    <circle cx="22" cy="8" r="7" fill="none" stroke="#4b5563" stroke-width="2"/>
    <rect x="14" y="14" width="10" height="8" rx="1" fill="#9ca3af"/>
    <!-- Long thin shaft -->
    <rect x="24" y="18" width="72" height="5" rx="1" fill="#9ca3af"/>
    <!-- Cup jaws at end -->
    <ellipse cx="100" cy="20" rx="7" ry="5" fill="#6b7280"/>
    <ellipse cx="100" cy="21" rx="5" ry="3" fill="#f8fafc"/>
    <text x="55" y="46" text-anchor="middle" class="inst-label">Pituitary Rongeur</text>
    <text x="55" y="57" text-anchor="middle" class="inst-sub">Disc space; neurosurgery</text>
  </g>

  <!-- Wire eye speculum -->
  <g transform="translate(440, 418)">
    <!-- Simple wire spring speculum -->
    <path d="M 0,25 Q 20,0 40,25 Q 20,50 0,25 Z" stroke="#374151" stroke-width="3" fill="none"/>
    <line x1="0" y1="25" x2="-20" y2="15" stroke="#374151" stroke-width="2.5"/>
    <line x1="0" y1="25" x2="-20" y2="35" stroke="#374151" stroke-width="2.5"/>
    <text x="12" y="72" text-anchor="middle" class="inst-label">Eye Speculum (Wire)</text>
    <text x="12" y="83" text-anchor="middle" class="inst-sub">Eyelid retraction; ophtho</text>
  </g>

  <!-- Castroviejo needle driver (small, ophtho) -->
  <g transform="translate(570, 418)">
    <!-- Very slender handles (spring type, no rings) -->
    <rect x="0" y="0" width="5" height="60" rx="2" fill="#374151"/>
    <rect x="12" y="0" width="5" height="60" rx="2" fill="#374151"/>
    <!-- Spring at top -->
    <path d="M 2,0 Q 8,-8 15,0" stroke="#6b7280" stroke-width="2" fill="none"/>
    <!-- Fine jaws -->
    <path d="M 2,60 L 8,72 L 14,60" stroke="#374151" stroke-width="2" fill="none"/>
    <text x="10" y="88" text-anchor="middle" class="inst-label">Castroviejo Nd. Driver</text>
    <text x="10" y="99" text-anchor="middle" class="inst-sub">Micro-suture; ophtho/vascular</text>
  </g>

  <!-- Crowe-Davis mouth gag -->
  <g transform="translate(680, 418)">
    <!-- Bite block section -->
    <rect x="0" y="20" width="45" height="12" rx="4" fill="#374151"/>
    <!-- Tongue blade -->
    <rect x="15" y="32" width="18" height="30" rx="2" fill="#6b7280"/>
    <!-- Hinge mechanism -->
    <rect x="44" y="18" width="8" height="16" rx="2" fill="#9ca3af"/>
    <!-- Second jaw -->
    <rect x="52" y="20" width="40" height="12" rx="4" fill="#374151"/>
    <text x="50" y="78" text-anchor="middle" class="inst-label">Crowe-Davis Mouth Gag</text>
    <text x="50" y="89" text-anchor="middle" class="inst-sub">T&amp;A; keeps mouth open</text>
  </g>

</svg>
