<svg width="820" height="265" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 265">
  <defs>
    <style>text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; }</style>
  </defs>
  <rect width="820" height="265" fill="#f8fafc" rx="4"/>
  <text x="410" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#0f172a">Surgical Wound Classification</text>

  <!-- CLASS I -->
  <rect x="8" y="40" width="196" height="218" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <rect x="8" y="40" width="196" height="38" rx="8" fill="#16a34a"/>
  <rect x="8" y="62" width="196" height="16" fill="#16a34a"/>
  <text x="106" y="64" text-anchor="middle" font-size="14" font-weight="bold" fill="white">CLASS I — CLEAN</text>
  <text x="106" y="100" text-anchor="middle" font-size="26" font-weight="bold" fill="#15803d">1–2%</text>
  <text x="106" y="116" text-anchor="middle" font-size="10" fill="#166534">SSI Rate</text>
  <line x1="20" y1="124" x2="192" y2="124" stroke="#bbf7d0" stroke-width="1"/>
  <text x="20" y="140" font-size="10" fill="#166534">• Elective procedure</text>
  <text x="20" y="155" font-size="10" fill="#166534">• No GI / GU / resp. entry</text>
  <text x="20" y="170" font-size="10" fill="#166534">• No inflammation</text>
  <text x="20" y="185" font-size="10" fill="#166534">• Intact sterile technique</text>
  <text x="20" y="210" font-size="10" font-style="italic" fill="#15803d">Hernia repair, mastectomy,</text>
  <text x="20" y="224" font-size="10" font-style="italic" fill="#15803d">thyroidectomy, arthroplasty,</text>
  <text x="20" y="238" font-size="10" font-style="italic" fill="#15803d">craniotomy</text>

  <!-- CLASS II -->
  <rect x="212" y="40" width="196" height="218" rx="8" fill="#fefce8" stroke="#ca8a04" stroke-width="2"/>
  <rect x="212" y="40" width="196" height="38" rx="8" fill="#ca8a04"/>
  <rect x="212" y="62" width="196" height="16" fill="#ca8a04"/>
  <text x="310" y="64" text-anchor="middle" font-size="12" font-weight="bold" fill="white">CLASS II — CLEAN-CONTAM.</text>
  <text x="310" y="100" text-anchor="middle" font-size="26" font-weight="bold" fill="#a16207">3–11%</text>
  <text x="310" y="116" text-anchor="middle" font-size="10" fill="#713f12">SSI Rate</text>
  <line x1="224" y1="124" x2="396" y2="124" stroke="#fef08a" stroke-width="1"/>
  <text x="224" y="140" font-size="10" fill="#713f12">• Controlled GI/GU entry</text>
  <text x="224" y="155" font-size="10" fill="#713f12">• No significant spillage</text>
  <text x="224" y="170" font-size="10" fill="#713f12">• Minor technique break</text>
  <text x="224" y="185" font-size="10" fill="#713f12">• Elective bowel entry</text>
  <text x="224" y="210" font-size="10" font-style="italic" fill="#a16207">Cholecystectomy, elective</text>
  <text x="224" y="224" font-size="10" font-style="italic" fill="#a16207">colectomy, hysterectomy,</text>
  <text x="224" y="238" font-size="10" font-style="italic" fill="#a16207">cystoscopy with stent</text>

  <!-- CLASS III -->
  <rect x="416" y="40" width="196" height="218" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <rect x="416" y="40" width="196" height="38" rx="8" fill="#ea580c"/>
  <rect x="416" y="62" width="196" height="16" fill="#ea580c"/>
  <text x="514" y="64" text-anchor="middle" font-size="14" font-weight="bold" fill="white">CLASS III — CONTAM.</text>
  <text x="514" y="100" text-anchor="middle" font-size="26" font-weight="bold" fill="#c2410c">10–17%</text>
  <text x="514" y="116" text-anchor="middle" font-size="10" fill="#7c2d12">SSI Rate</text>
  <line x1="428" y1="124" x2="600" y2="124" stroke="#fed7aa" stroke-width="1"/>
  <text x="428" y="140" font-size="10" fill="#7c2d12">• Open fresh trauma</text>
  <text x="428" y="155" font-size="10" fill="#7c2d12">• Major technique break</text>
  <text x="428" y="170" font-size="10" fill="#7c2d12">• Acute inflammation</text>
  <text x="428" y="185" font-size="10" fill="#7c2d12">• Gross GI spillage</text>
  <text x="428" y="210" font-size="10" font-style="italic" fill="#c2410c">Perforated appendix (no</text>
  <text x="428" y="224" font-size="10" font-style="italic" fill="#c2410c">abscess), GSW, bowel</text>
  <text x="428" y="238" font-size="10" font-style="italic" fill="#c2410c">injury with spillage</text>

  <!-- CLASS IV -->
  <rect x="620" y="40" width="196" height="218" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <rect x="620" y="40" width="196" height="38" rx="8" fill="#dc2626"/>
  <rect x="620" y="62" width="196" height="16" fill="#dc2626"/>
  <text x="718" y="64" text-anchor="middle" font-size="13" font-weight="bold" fill="white">CLASS IV — DIRTY / INF.</text>
  <text x="718" y="100" text-anchor="middle" font-size="26" font-weight="bold" fill="#b91c1c">~27%</text>
  <text x="718" y="116" text-anchor="middle" font-size="10" fill="#7f1d1d">SSI Rate</text>
  <line x1="632" y1="124" x2="804" y2="124" stroke="#fecaca" stroke-width="1"/>
  <text x="632" y="140" font-size="10" fill="#7f1d1d">• Old traumatic wound</text>
  <text x="632" y="155" font-size="10" fill="#7f1d1d">• Devitalized tissue</text>
  <text x="632" y="170" font-size="10" fill="#7f1d1d">• Pre-existing infection</text>
  <text x="632" y="185" font-size="10" fill="#7f1d1d">• Perforated viscus</text>
  <text x="632" y="210" font-size="10" font-style="italic" fill="#b91c1c">Abscess drainage, fecal</text>
  <text x="632" y="224" font-size="10" font-style="italic" fill="#b91c1c">peritonitis, infected</text>
  <text x="632" y="238" font-size="10" font-style="italic" fill="#b91c1c">joint exploration</text>
</svg>
