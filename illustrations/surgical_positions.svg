<svg width="840" height="430" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 430">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; }
      .pt { fill: #0d9488; }
      .pt-dark { fill: #0f766e; }
      .head { fill: #fbbf24; }
      .table { fill: #94a3b8; }
      .pillow { fill: #e2e8f0; stroke: #94a3b8; stroke-width: 0.5; }
      .panel { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 1.5; }
      .pname { font-size: 12px; font-weight: bold; fill: #0f172a; }
      .psub { font-size: 9.5px; fill: #64748b; }
    </style>
  </defs>
  <rect width="840" height="430" fill="#f1f5f9" rx="4"/>
  <text x="420" y="24" text-anchor="middle" font-size="17" font-weight="bold" fill="#0f172a">Standard Surgical Patient Positions</text>

  <!-- ============ ROW 1 (y=35): 4 panels ============ -->

  <!-- PANEL 1: SUPINE (x=8) -->
  <g transform="translate(8,35)">
    <rect width="198" height="178" rx="6" class="panel"/>
    <text x="99" y="16" text-anchor="middle" class="pname">SUPINE</text>
    <!-- OR Table -->
    <rect x="12" y="115" width="175" height="10" rx="2" class="table"/>
    <!-- Pillow under head -->
    <rect x="12" y="106" width="24" height="9" rx="3" class="pillow"/>
    <!-- Head (face up - nose dots above) -->
    <circle cx="24" cy="100" r="10" class="head"/>
    <circle cx="24" cy="90" r="2.5" fill="#f59e0b"/>
    <!-- Body -->
    <rect x="34" y="95" width="65" height="20" rx="4" class="pt"/>
    <!-- Hips -->
    <rect x="97" y="99" width="22" height="16" rx="3" class="pt-dark"/>
    <!-- Thighs -->
    <rect x="117" y="99" width="32" height="16" rx="3" class="pt"/>
    <!-- Shins -->
    <rect x="147" y="99" width="28" height="16" rx="3" class="pt-dark"/>
    <!-- Arms at sides -->
    <rect x="34" y="113" width="65" height="6" rx="2" fill="#0d9488" opacity="0.3"/>
    <text x="99" y="143" text-anchor="middle" class="psub">Face up · Arms at sides</text>
    <text x="99" y="156" text-anchor="middle" class="psub">or on armboards</text>
    <text x="99" y="170" text-anchor="middle" font-size="9" fill="#0f766e" font-style="italic">General, abdominal,</text>
    <text x="99" y="180" text-anchor="middle" font-size="9" fill="#0f766e" font-style="italic">cardiac, OB/GYN</text>
  </g>

  <!-- PANEL 2: PRONE (x=213) -->
  <g transform="translate(213,35)">
    <rect width="198" height="178" rx="6" class="panel"/>
    <text x="99" y="16" text-anchor="middle" class="pname">PRONE</text>
    <!-- OR Table -->
    <rect x="12" y="115" width="175" height="10" rx="2" class="table"/>
    <!-- Wilson frame pads (two rectangles under chest/hips) -->
    <rect x="48" y="108" width="32" height="8" rx="3" fill="#cbd5e1"/>
    <rect x="100" y="108" width="32" height="8" rx="3" fill="#cbd5e1"/>
    <!-- Head (face DOWN - nose dots below, toward table) -->
    <circle cx="24" cy="100" r="10" class="head"/>
    <circle cx="24" cy="110" r="2.5" fill="#f59e0b"/>
    <!-- Body - same as supine but with prone indicator -->
    <rect x="34" y="95" width="65" height="20" rx="4" class="pt"/>
    <rect x="97" y="99" width="22" height="16" rx="3" class="pt-dark"/>
    <rect x="117" y="99" width="32" height="16" rx="3" class="pt"/>
    <rect x="147" y="99" width="28" height="16" rx="3" class="pt-dark"/>
    <text x="99" y="143" text-anchor="middle" class="psub">Face down · Arms on boards</text>
    <text x="99" y="156" text-anchor="middle" class="psub">Chest/hip rolls or Wilson frame</text>
    <text x="99" y="170" text-anchor="middle" font-size="9" fill="#0f766e" font-style="italic">Spine, posterior cranial</text>
    <text x="99" y="180" text-anchor="middle" font-size="9" fill="#0f766e" font-style="italic">fossa, PSARP, burns</text>
  </g>

  <!-- PANEL 3: LATERAL DECUBITUS (x=418) -->
  <g transform="translate(418,35)">
    <rect width="198" height="178" rx="6" class="panel"/>
    <text x="99" y="16" text-anchor="middle" class="pname">LATERAL DECUBITUS</text>
    <!-- OR Table -->
    <rect x="12" y="115" width="175" height="10" rx="2" class="table"/>
    <!-- Axillary roll under down arm -->
    <rect x="42" y="110" width="14" height="7" rx="7" fill="#cbd5e1"/>
    <!-- Head on pillow/bean bag, lateral view -->
    <circle cx="24" cy="100" r="10" class="head"/>
    <!-- Body - on side: slightly wider appearance (chest width) -->
    <rect x="34" y="93" width="65" height="26" rx="5" class="pt"/>
    <!-- Hips wider when on side -->
    <rect x="97" y="96" width="22" height="24" rx="4" class="pt-dark"/>
    <!-- Legs stacked (upper slightly forward) -->
    <rect x="117" y="94" width="32" height="14" rx="3" class="pt"/>
    <rect x="147" y="94" width="28" height="14" rx="3" class="pt-dark"/>
    <!-- Bottom leg -->
    <rect x="117" y="108" width="32" height="12" rx="3" fill="#0f766e" opacity="0.7"/>
    <rect x="147" y="108" width="28" height="12" rx="3" fill="#0f766e" opacity="0.5"/>
    <!-- Pillow between knees -->
    <rect x="115" y="105" width="5" height="6" rx="2" fill="#e2e8f0" stroke="#94a3b8" stroke-width="0.5"/>
    <!-- Bean bag / positioning device indicator -->
    <path d="M 12,115 Q 35,108 60,113 Q 90,108 120,112 Q 150,108 175,113 L 175,125 L 12,125 Z" fill="#94a3b8" opacity="0.3"/>
    <text x="99" y="143" text-anchor="middle" class="psub">On side · Axillary roll</text>
    <text x="99" y="156" text-anchor="middle" class="psub">Pillow between knees</text>
    <text x="99" y="170" text-anchor="middle" font-size="9" fill="#0f766e" font-style="italic">Thoracic, kidney (flank),</text>
    <text x="99" y="180" text-anchor="middle" font-size="9" fill="#0f766e" font-style="italic">hip arthroplasty (lateral)</text>
  </g>

  <!-- PANEL 4: LITHOTOMY (x=623) -->
  <g transform="translate(623,35)">
    <rect width="198" height="178" rx="6" class="panel"/>
    <text x="99" y="16" text-anchor="middle" class="pname">LITHOTOMY</text>
    <!-- OR Table (shorter, legs removed) -->
    <rect x="12" y="115" width="95" height="10" rx="2" class="table"/>
    <!-- Head + torso flat on table -->
    <circle cx="24" cy="100" r="10" class="head"/>
    <circle cx="24" cy="90" r="2.5" fill="#f59e0b"/>
    <rect x="34" y="95" width="65" height="20" rx="4" class="pt"/>
    <rect x="97" y="99" width="22" height="16" rx="3" class="pt-dark"/>
    <!-- Legs raised 90° in stirrups -->
    <!-- Upper legs (thighs going UP from hips) -->
    <rect x="105" y="65" width="14" height="36" rx="4" class="pt"/>
    <rect x="121" y="65" width="14" height="36" rx="4" class="pt"/>
    <!-- Lower legs (going down from knee - bent) -->
    <rect x="105" y="55" width="14" height="14" rx="4" class="pt-dark"/>
    <rect x="121" y="55" width="14" height="14" rx="4" class="pt-dark"/>
    <!-- Stirrup circles at feet -->
    <circle cx="112" cy="50" r="6" fill="none" stroke="#64748b" stroke-width="2"/>
    <circle cx="128" cy="50" r="6" fill="none" stroke="#64748b" stroke-width="2"/>
    <!-- Stirrup poles going down -->
    <line x1="112" y1="56" x2="112" y2="100" stroke="#94a3b8" stroke-width="2" stroke-dasharray="3,2"/>
    <line x1="128" y1="56" x2="128" y2="100" stroke="#94a3b8" stroke-width="2" stroke-dasharray="3,2"/>
    <text x="99" y="143" text-anchor="middle" class="psub">Legs elevated in stirrups</text>
    <text x="99" y="156" text-anchor="middle" class="psub">Table leg section removed</text>
    <text x="99" y="170" text-anchor="middle" font-size="9" fill="#0f766e" font-style="italic">Gynecologic, urologic,</text>
    <text x="99" y="180" text-anchor="middle" font-size="9" fill="#0f766e" font-style="italic">colorectal (LAR), cystoscopy</text>
  </g>

  <!-- ============ ROW 2 (y=222): 3 panels centered ============ -->

  <!-- PANEL 5: TRENDELENBURG (x=72) -->
  <g transform="translate(72,222)">
    <rect width="210" height="198" rx="6" class="panel"/>
    <text x="105" y="16" text-anchor="middle" class="pname">TRENDELENBURG</text>
    <!-- Tilted table + body: head DOWN ~15° -->
    <!-- Using a rotated group for the table+body: rotate around the table center -->
    <g transform="rotate(-15, 105, 115)">
      <rect x="14" y="115" width="182" height="10" rx="2" class="table"/>
      <rect x="14" y="106" width="22" height="9" rx="3" class="pillow"/>
      <circle cx="25" cy="100" r="10" class="head"/>
      <circle cx="25" cy="90" r="2.5" fill="#f59e0b"/>
      <rect x="35" y="95" width="65" height="20" rx="4" class="pt"/>
      <rect x="98" y="99" width="22" height="16" rx="3" class="pt-dark"/>
      <rect x="118" y="99" width="32" height="16" rx="3" class="pt"/>
      <rect x="148" y="99" width="28" height="16" rx="3" class="pt-dark"/>
      <!-- Footboard -->
      <rect x="190" y="90" width="6" height="36" rx="2" fill="#64748b"/>
    </g>
    <!-- Down arrow for head direction -->
    <text x="30" y="95" font-size="18" fill="#ef4444">↓</text>
    <text x="160" y="85" font-size="18" fill="#22c55e">↑</text>
    <text x="105" y="158" text-anchor="middle" class="psub">Head DOWN · Feet UP (~15°)</text>
    <text x="105" y="172" text-anchor="middle" class="psub">Footboard prevents sliding</text>
    <text x="105" y="188" text-anchor="middle" font-size="9" fill="#0f766e" font-style="italic">Laparoscopic pelvic surgery,</text>
    <text x="105" y="198" text-anchor="middle" font-size="9" fill="#0f766e" font-style="italic">hysterectomy, sigmoid colectomy</text>
  </g>

  <!-- PANEL 6: REVERSE TRENDELENBURG (x=315) -->
  <g transform="translate(315,222)">
    <rect width="210" height="198" rx="6" class="panel"/>
    <text x="105" y="13" text-anchor="middle" class="pname">REVERSE TRENDELENBURG</text>
    <!-- Table + body tilted: head UP ~15° -->
    <g transform="rotate(15, 105, 115)">
      <rect x="14" y="115" width="182" height="10" rx="2" class="table"/>
      <rect x="14" y="106" width="22" height="9" rx="3" class="pillow"/>
      <circle cx="25" cy="100" r="10" class="head"/>
      <circle cx="25" cy="90" r="2.5" fill="#f59e0b"/>
      <rect x="35" y="95" width="65" height="20" rx="4" class="pt"/>
      <rect x="98" y="99" width="22" height="16" rx="3" class="pt-dark"/>
      <rect x="118" y="99" width="32" height="16" rx="3" class="pt"/>
      <rect x="148" y="99" width="28" height="16" rx="3" class="pt-dark"/>
      <!-- Padded footboard -->
      <rect x="190" y="90" width="6" height="36" rx="2" fill="#64748b"/>
    </g>
    <!-- Up arrow for head, down for feet -->
    <text x="30" y="88" font-size="18" fill="#22c55e">↑</text>
    <text x="160" y="140" font-size="18" fill="#ef4444">↓</text>
    <text x="105" y="158" text-anchor="middle" class="psub">Head UP · Feet DOWN (~15°)</text>
    <text x="105" y="172" text-anchor="middle" class="psub">Gravity pulls organs cephalad</text>
    <text x="105" y="188" text-anchor="middle" font-size="9" fill="#0f766e" font-style="italic">Upper abdominal/laparoscopic</text>
    <text x="105" y="198" text-anchor="middle" font-size="9" fill="#0f766e" font-style="italic">cholecystectomy, thyroidectomy</text>
  </g>

  <!-- PANEL 7: FOWLER'S / SEMI-FOWLER'S (x=558) -->
  <g transform="translate(558,222)">
    <rect width="210" height="198" rx="6" class="panel"/>
    <text x="105" y="16" text-anchor="middle" class="pname">FOWLER'S / SEMI-FOWLER'S</text>
    <!-- Table lower section (flat): hips to feet -->
    <rect x="14" y="130" width="105" height="10" rx="2" class="table"/>
    <!-- Table back section (raised ~45°): from hips up -->
    <!-- Raised back section of table -->
    <g transform="rotate(-45, 118, 130)">
      <rect x="118" y="120" width="68" height="10" rx="2" class="table"/>
    </g>
    <!-- Lower legs flat on table -->
    <rect x="28" y="120" width="28" height="14" rx="3" class="pt-dark"/>
    <rect x="54" y="120" width="32" height="14" rx="3" class="pt"/>
    <rect x="84" y="120" width="22" height="14" rx="3" class="pt-dark"/>
    <!-- Torso elevated at angle -->
    <g transform="rotate(-45, 105, 130)">
      <rect x="105" y="110" width="65" height="20" rx="4" class="pt"/>
    </g>
    <!-- Head (follows torso angle) -->
    <g transform="rotate(-45, 150, 130)">
      <circle cx="178" cy="104" r="10" class="head"/>
      <circle cx="186" cy="97" r="2.5" fill="#f59e0b"/>
    </g>
    <!-- Knee gatch (slight knee elevation) -->
    <line x1="82" y1="130" x2="82" y2="145" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="3,2"/>
    <!-- Angle indicator -->
    <path d="M 104,130 L 104,110 A 20,20 0 0,1 118,130 Z" fill="#0d9488" opacity="0.2"/>
    <text x="95" y="118" font-size="8" fill="#0f766e">45°</text>
    <text x="105" y="163" text-anchor="middle" class="psub">Back elevated 30–90°</text>
    <text x="105" y="177" text-anchor="middle" class="psub">Knee gatch optional</text>
    <text x="105" y="193" text-anchor="middle" font-size="9" fill="#0f766e" font-style="italic">Posterior fossa craniotomy,</text>
    <text x="105" y="203" text-anchor="middle" font-size="9" fill="#0f766e" font-style="italic">shoulder (beach chair)</text>
  </g>

  <!-- Legend -->
  <g transform="translate(10, 418)">
    <circle cx="8" cy="7" r="5" fill="#fbbf24"/>
    <text x="17" y="11" font-size="9" fill="#374151">Head</text>
    <rect x="55" y="2" width="18" height="10" rx="2" fill="#0d9488"/>
    <text x="77" y="11" font-size="9" fill="#374151">Body</text>
    <rect x="105" y="2" width="18" height="10" rx="2" fill="#94a3b8"/>
    <text x="127" y="11" font-size="9" fill="#374151">OR Table</text>
    <circle cx="170" cy="7" r="4" fill="none" stroke="#64748b" stroke-width="2"/>
    <text x="178" y="11" font-size="9" fill="#374151">Stirrup</text>
    <rect x="215" y="2" width="18" height="10" rx="2" fill="#cbd5e1" stroke="#94a3b8" stroke-width="0.5"/>
    <text x="237" y="11" font-size="9" fill="#374151">Support/Roll</text>
    <circle cx="295" cy="7" r="2.5" fill="#f59e0b"/>
    <text x="302" y="11" font-size="9" fill="#374151">Face direction</text>
  </g>
</svg>
